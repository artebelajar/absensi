<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Abstract Red</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Unbounded:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary-red: #ff3333;
            --dark-red: #8b0000;
            --bg-black: #080808;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-white: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Unbounded', sans-serif;
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        /* Abstract Background Elements */
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 51, 51, 0.15) 0%, transparent 70%);
            z-index: -1;
            filter: blur(80px);
        }

        /* Main Layout */
        .sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-white);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        nav a {
            color: inherit;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            transition: 0.3s;
        }
        nav a:hover { color: var(--primary-red); }

        .main-content {
            margin-left: 280px;
            padding: 3rem;
            width: calc(100% - 280px);
        }

        /* Typography */
        h2, h3 {
            font-family: 'Syne', sans-serif;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        h2 { font-size: 2.5rem; margin-bottom: 0.5rem; color: #fff; }
        h3 { font-size: 1.2rem; color: var(--primary-red); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; }
        h3::before { content: ''; width: 20px; height: 2px; background: var(--primary-red); }

        .admin-info {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            border: 1px solid var(--border-white);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Card System */
        .section-card {
            background: var(--card-bg);
            border: 1px solid var(--border-white);
            border-radius: 24px;
            padding: 2rem;
            margin-bottom: 3rem;
            backdrop-filter: blur(10px);
        }

        /* Form Styling */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .input-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #888; }

        input, select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-white);
            padding: 12px 16px;
            border-radius: 10px;
            color: #fff;
            font-family: 'Unbounded', sans-serif;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--primary-red); background: rgba(255, 51, 51, 0.05); }

        /* Table Styling */
        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
            margin-top: -10px;
        }

        th {
            text-align: left;
            padding: 15px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
        }

        td {
            padding: 15px;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid var(--border-white);
            border-bottom: 1px solid var(--border-white);
            font-size: 0.85rem;
        }

        td:first-child { border-left: 1px solid var(--border-white); border-radius: 12px 0 0 12px; }
        td:last-child { border-right: 1px solid var(--border-white); border-radius: 0 12px 12px 0; }

        tr:hover td { background: rgba(255, 51, 51, 0.05); border-color: rgba(255, 51, 51, 0.3); }

        /* Buttons */
        button {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-primary { background: var(--primary-red); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--primary-red); color: var(--primary-red); }
        .btn-excel { background: #10b981; color: #fff; margin-top: 1rem; width: 100%; }

        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); opacity: 0.9; }

        .logout-btn {
            margin-top: auto;
            background: rgba(255, 51, 51, 0.1);
            color: var(--primary-red);
            border: 1px solid rgba(255, 51, 51, 0.2);
        }

        /* Status Badges */
        .status-active { color: #10b981; font-weight: bold; }
        .status-inactive { color: #ef4444; }

        @media (max-width: 992px) {
            .sidebar { width: 80px; padding: 1rem; }
            .sidebar span { display: none; }
            .main-content { margin-left: 80px; width: calc(100% - 80px); padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="bg-glow" style="top: -100px; left: -100px;"></div>
    <div class="bg-glow" style="bottom: -100px; right: -100px; background: radial-gradient(circle, rgba(139, 0, 0, 0.1) 0%, transparent 70%);"></div>

    <aside class="sidebar">
        <h2 style="font-size: 1.5rem; margin-bottom: 3rem;">A<span style="color:var(--primary-red)">.</span>DB</h2>
        <nav style="display: flex; flex-direction: column; gap: 20px;">
            <div style="opacity: 0.5;;"><a href="#sectionTambahUser"><i class="fa-solid fa-gauge"></i> <span>Dashboard</span></a></div>
            <div style="opacity: 0.5;"><a href="#sectionDaftarUser"><i class="fa-solid fa-users"></i> <span>Users</span></a></div>
            <div style="opacity: 0.5;"><a href="#sectionRekapAbsensi"><i class="fa-solid fa-calendar-check"></i> <span>Attendance</span></a></div>
        </nav>
        <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> <span>Logout</span></button>
    </aside>

    <main class="main-content">
        <header>
            <h2>Admin Panel</h2>
            <div class="admin-info">
                <span>Login sebagai: <strong id="adminLabel" style="color: var(--primary-red);">-</strong></span>
                <i class="fa-solid fa-circle-user" style="font-size: 1.5rem; opacity: 0.5;"></i>
            </div>
        </header>

        <!-- Section Tambah User -->
        <section class="section-card" id="sectionTambahUser">
            <h3>Management / Tambah User</h3>
            <form onsubmit="tambahUser(event)">
                <div class="form-grid">
                    <div class="input-box">
                        <label>Nama Lengkap</label>
                        <input type="text" id="fieldName" placeholder="Nama..." required>
                    </div>
                    <div class="input-box">
                        <label>Email Address</label>
                        <input type="email" id="fieldEmail" placeholder="Email..." required>
                    </div>
                    <div class="input-box">
                        <label>Secure Password</label>
                        <input type="password" id="fieldPassword" placeholder="••••••••" required minlength="6">
                    </div>
                    <div class="input-box">
                        <label>Akses Role</label>
                        <select id="fieldRole" required>
                            <option value="admin">Admin</option>
                            <option value="user">User</option>
                        </select>
                    </div>
                </div>
                <div style="margin-top: 1.5rem; display: flex; align-items: center; gap: 20px;">
                    <button type="submit" class="btn-primary">Konfirmasi Tambah</button>
                    <p id="formResult" style="font-size: 0.8rem; opacity: 0.7;"></p>
                </div>
            </form>
        </section>

        <!-- Section Daftar User -->
        <section class="section-card" id="sectionDaftarUser">
            <h3>Database / Daftar User</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Nama</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr>
                            <td colspan="4" style="text-align: center; opacity: 0.5; padding: 3rem;">Memuat data user...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Section Rekap Absensi -->
        <section class="section-card" id="sectionRekapAbsensi">
            <h3>Report / Rekap Absensi</h3>
            <div style="display: flex; gap: 15px; align-items: flex-end; margin-bottom: 2rem; flex-wrap: wrap;">
                <div class="input-box" style="flex: 1; min-width: 200px;">
                    <label>Pilih Periode Bulan</label>
                    <input type="month" id="filterMonth" required>
                </div>
                <button onclick="loadAbsensi()" class="btn-outline" style="height: 48px;">Filter Data</button>
            </div>
            
            <p id="absensiResult" style="font-size: 0.8rem; margin-bottom: 1rem; color: var(--primary-red);"></p>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama</th>
                            <th>Email</th>
                            <th>Check In</th>
                            <th>Check Out</th>
                        </tr>
                    </thead>
                    <tbody id="absensiTableBody">
                        <tr>
                            <td colspan="5" style="text-align: center; opacity: 0.5; padding: 3rem;">Silahkan filter berdasarkan bulan...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <button class="btn-excel" onclick="downloadAbsensiExcel()">
                <i class="fa-solid fa-file-excel"></i> Download Rekap Excel
            </button>
        </section>
    </main>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

    <script>
        let allUsers = [];
        let currentAbsensiData = []; 
        let currentMonth = ''; 
        
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, "0");
        const monthInput = document.getElementById('filterMonth');
        if (monthInput) {
            monthInput.value = `${yyyy}-${mm}`;
            currentMonth = `${yyyy}-${mm}`;
        }

        (async () => {
            const res = await fetch("/auth/me", {credentials: "include"});
            if (!res.ok) return window.location.href = "/login.html";
            const {user} = await res.json();
            const adminLabel = document.getElementById("adminLabel");
            if (adminLabel) adminLabel.innerHTML = user.name;
            await loadUsers();
            await loadAbsensi();
        })();

        async function loadUsers() {
            const res = await fetch("/admin/users", {credentials: "include"});
            if (res.status === 401 || res.status === 403) {
                window.location.href = "/login.html"; 
                return; 
            }
            const {data} = await res.json();
            const tbody = document.getElementById("userTableBody");
            allUsers = data || [];
            if (!allUsers.length) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center">Tidak ada data user</td></tr>`;
                return;
            }
            tbody.innerHTML = allUsers.map(u => `
                <tr>
                    <td>${escapeHtml(u.name)}</td>
                    <td>${escapeHtml(u.email)}</td>
                    <td style="text-transform: capitalize;">${escapeHtml(u.role)}</td>
                    <td><span class="${u.is_active ? 'status-active' : 'status-inactive'}">${u.is_active ? "Aktif" : "Tidak Aktif"}</span></td>
                </tr>
            `).join("");
        }

        async function loadAbsensi() {
            const monthInput = document.getElementById("filterMonth");
            if (!monthInput) return;
            const month = monthInput.value;
            if (!month) {
                const absensiResult = document.getElementById('absensiResult');
                if (absensiResult) absensiResult.textContent = 'Tanggal tidak valid';
                return;
            }
            currentMonth = month;
            const res = await fetch(`/admin/attendances?month=${month}`, { credentials: "include" });
            const {data} = await res.json();
            const tbody = document.getElementById("absensiTableBody");
            const absensiResult = document.getElementById('absensiResult');
            
            if (absensiResult) absensiResult.textContent = '';
            if (!res.ok) {
                if (absensiResult) absensiResult.textContent = data?.message || 'Error load data';
                if (tbody) tbody.innerHTML = `<tr><td colspan="5" style="text-align:center">Error load data</tr>`;
                currentAbsensiData = [];
                return;
            }

            currentAbsensiData = data || [];
            if (!currentAbsensiData.length) {
                if (tbody) tbody.innerHTML = `<tr><td colspan="5" style="text-align:center">Tidak ada data untuk bulan ${month}</td></tr>`;
                return;
            }

            tbody.innerHTML = currentAbsensiData.map((a, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${escapeHtml(a.name ?? "-")}</td>
                    <td>${escapeHtml(a.email ?? "-")}</td>
                    <td>${formatTanggal(a.check_in)}</td>
                    <td>${a.check_out ? formatTanggal(a.check_out) : "<span style='opacity:0.3'>-</span>"}</td>
                </tr>
            `).join("");
            
            if (absensiResult) absensiResult.textContent = `Menampilkan ${currentAbsensiData.length} data absensi untuk bulan ${month}`;
        }

        async function downloadAbsensiExcel() {
            if (!currentMonth) { showToast('Pilih bulan terlebih dahulu', 'warning'); return; }
            if (currentAbsensiData.length === 0) { showToast(`Tidak ada data untuk bulan ${currentMonth}`, 'warning'); return; }
            showToast('⏳ Generating file...', 'info');
            try {
                const response = await fetch(`/admin/export/absensi-excel?month=${currentMonth}`, { credentials: "include" });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Export gagal');
                }
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `absensi_${currentMonth}.xlsx`;
                document.body.appendChild(a); a.click();
                document.body.removeChild(a); window.URL.revokeObjectURL(url);
                showToast(`✅ Download berhasil!`, 'success');
            } catch (error) {
                exportAbsensiToExcelClientSide(currentAbsensiData, currentMonth);
            }
        }

        function exportAbsensiToExcelClientSide(data, month) {
            const excelData = data.map((item, index) => ({
                'NO': index + 1,
                'NAMA': item.name || '-',
                'EMAIL': item.email || '-',
                'CHECK IN': formatDateTimeForExcel(item.check_in),
                'CHECK OUT': item.check_out ? formatDateTimeForExcel(item.check_out) : '-',
            }));
            const worksheet = XLSX.utils.json_to_sheet(excelData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, `Absensi ${month}`);
            XLSX.writeFile(workbook, `absensi_${month}.xlsx`);
            showToast(`✅ Export berhasil!`, 'success');
        }

        function formatDateTimeForExcel(date) {
            if (!date) return '-';
            const d = new Date(date);
            return `${d.toLocaleDateString('id-ID')} ${d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })}`;
        }

        function formatTanggal(iso) {
            if (!iso) return "-";
            const d = new Date(iso);
            return `${d.toLocaleDateString("id-ID", {day: '2-digit', month: 'short'})} | ${d.toLocaleTimeString('id-ID', {hour: '2-digit', minute: '2-digit'})}`;
        }

        async function tambahUser(e) {
            e.preventDefault();
            const body = {
                name: document.getElementById("fieldName").value,
                email: document.getElementById("fieldEmail").value,
                password: document.getElementById("fieldPassword").value,
                role: document.getElementById("fieldRole").value,
            };
            const res = await fetch("/admin/users", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(body),
                credentials: "include"
            });
            const data = await res.json();
            const formResult = document.getElementById("formResult");
            if (formResult) formResult.textContent = data.message || data.error;
            if (res.ok) { e.target.reset(); await loadUsers(); showToast('User berhasil ditambah'); }
        }

        async function logout() {
            await fetch("/auth/logout", { method: "POST", credentials: "include" });
            window.location.href = "/login.html";
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
        }

        function showToast(message, type = 'success') {
            const oldToast = document.querySelector('.toast-notification');
            if (oldToast) oldToast.remove();
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.style.cssText = `position: fixed; bottom: 20px; right: 20px; background: ${type === 'success' ? '#10b981' : type === 'warning' ? '#f59e0b' : '#3b82f6'}; color: white; padding: 12px 24px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 10000; animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-size: 14px; font-weight: 500;`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
        
        const style = document.createElement('style');
        style.textContent = `@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
