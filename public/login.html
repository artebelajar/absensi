<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin - Abstract Dark</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Unbounded:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-red: #ff3333;
            --accent-red: #ff0000;
            --bg-dark: #050505;
            --glass-white: rgba(255, 255, 255, 0.03);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-dark);
            font-family: 'Unbounded', sans-serif;
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        /* Latar Belakang Abstrak Dinamis */
        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            filter: blur(100px);
            border-radius: 50%;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        .shape-1 {
            width: 400px; height: 400px;
            background: var(--accent-red);
            top: -100px; left: -100px;
        }

        .shape-2 {
            width: 300px; height: 300px;
            background: #440000;
            bottom: -50px; right: -50px;
            animation-delay: -5s;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }

        /* Container Card */
        .login-card {
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 4rem 3rem;
            border-radius: 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        h2 {
            font-family: 'Syne', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
            color: #fff;
        }

        h2 span {
            color: var(--primary-red);
            display: block;
            font-size: 1rem;
            letter-spacing: 5px;
            margin-top: 10px;
        }

        /* Input Styles */
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-family: 'Unbounded', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary-red);
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.2);
        }

        /* Button Style */
        button {
            width: 100%;
            padding: 18px;
            margin-top: 1rem;
            background: var(--primary-red);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            letter-spacing: 1px;
        }

        button:hover {
            background: #ff0000;
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(255, 51, 51, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        /* Pesan Hasil */
        #result {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--primary-red);
            font-weight: 400;
            min-height: 1.2em;
        }

        ::placeholder {
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="login-card">
        <h2>LOGIN <span>ADMINISTRATOR</span></h2>

        <div class="input-group">
            <input type="email" id="email" placeholder="Email Address" />
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Password" />
        </div>

        <button onclick="login()">Authenticate</button>

        <p id="result"></p>
    </div>

    <script>
        async function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const resultElement = document.getElementById("result");

            if(!email || !password) {
                resultElement.innerText = "Please fill all fields";
                return;
            }

            try {
                const res = await fetch("/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password }),
                });

                const data = await res.json();
                resultElement.innerHTML = data.message;

                if (!res.ok) return;

                // Animasi transisi keluar sebelum redirect
                document.querySelector('.login-card').style.opacity = '0.5';
                
                setTimeout(() => {
                    if (data.role === "admin") {
                        window.location.href = "/dashboard.html";
                    } else {
                        window.location.href = "/index.html";
                    }
                }, 500);

            } catch (error) {
                resultElement.innerText = "Connection error";
            }
        }
    </script>
</body>
</html>
